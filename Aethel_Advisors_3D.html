<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethel Advisors | Institutional Authority</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0a0a0c; overflow: hidden; font-family: 'Georgia', serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .ui-overlay { position: absolute; top: 2rem; left: 2rem; pointer-events: none; z-index: 10; }

        .logo-display-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            perspective: 1200px;
        }

        /* Presentation Frame for Solid Background Images */
        .floating-logo {
            max-width: 450px;
            max-height: 450px;
            width: auto;
            height: auto;
            border-radius: 8px; /* Sharp, clean edges like a glass print */
            border: 1px solid rgba(255, 255, 255, 0.4); /* Subtle edge highlight */
            /* Deep, premium 3D shadow */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            background-color: #fff; /* Ensures no weird transparency glitches */
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="text-[10px] text-amber-500 border border-amber-500/30 px-3 py-1 rounded bg-black/80 backdrop-blur-md uppercase tracking-widest italic font-bold">
            Asset: Aethel Identity // Environment: Active
        </div>
    </div>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- Your Exact Uploaded Logo with URL-Encoded Spaces -->
    <div class="logo-display-wrapper">
        <img src="AETHEL%20ADVISIORS%20LOGO.png" alt="Aethel Advisors Logo" class="floating-logo" id="aethel-logo">
    </div>

    <script>
        // --- Interactive 3D Tilt for Your Image ---
        const logo = document.getElementById('aethel-logo');
        const wrapper = document.querySelector('.logo-display-wrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.02)`;
        });

        wrapper.addEventListener('mouseleave', () => {
            logo.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
            logo.style.transition = "transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)";
        });
        wrapper.addEventListener('mouseenter', () => {
            logo.style.transition = "none";
        });

        // --- Ambient 3D Background (Spotlights) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100), 
            new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -3;
        scene.add(floor);

        const sun = new THREE.SpotLight(0xfffaf0, 2.0);
        sun.position.set(10, 15, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            sun.position.x = Math.sin(clock.getElapsedTime() * 0.5) * 10;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
