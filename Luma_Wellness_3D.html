<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Wellness | Engineered Serenity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #fdfbf7; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .ui-overlay { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; }
        
        /* The container that holds your actual uploaded image */
        .logo-display-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            perspective: 1000px;
        }

        .floating-logo {
            max-width: 400px;
            max-height: 400px;
            width: auto;
            height: auto;
            border-radius: 20px;
            /* Creates a 3D shadow behind your image */
            filter: drop-shadow(0px 25px 35px rgba(0, 0, 0, 0.2));
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="text-[10px] text-emerald-800 border border-emerald-200 px-4 py-2 rounded-full bg-white/80 backdrop-blur-md uppercase tracking-widest font-bold shadow-sm">
            Status: Luma Identity // Environment: Active
        </div>
    </div>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- Your Exact Uploaded Logo -->
    <div class="logo-display-wrapper">
        <img src="Wellness logo pt.png" alt="Luma Wellness Logo" class="floating-logo" id="luma-logo" onerror="this.src='https://via.placeholder.com/400x400?text=Upload+Wellness+logo+pt.png+to+GitHub'">
    </div>

    <script>
        // --- Interactive 3D Tilt for Your Image ---
        const logo = document.getElementById('luma-logo');
        const wrapper = document.querySelector('.logo-display-wrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.05)`;
        });

        wrapper.addEventListener('mouseleave', () => {
            logo.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
            logo.style.transition = "transform 0.5s ease";
        });
        wrapper.addEventListener('mouseenter', () => {
            logo.style.transition = "none";
        });

        // --- Ambient 3D Background (Silk) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0xfdfbf7, 5, 25);
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 8);
        scene.add(light);

        const silkGeo = new THREE.PlaneGeometry(40, 40, 80, 80);
        const silkMat = new THREE.MeshStandardMaterial({ color: 0xfdfbf7, roughness: 0.5, metalness: 0.1 });
        const silk = new THREE.Mesh(silkGeo, silkMat);
        silk.position.z = -5;
        scene.add(silk);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const pos = silkGeo.attributes.position;
            for(let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                pos.setZ(i, Math.sin(x * 0.4 + t) * 0.6 + Math.cos(y * 0.3 + t) * 0.4);
            }
            pos.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
