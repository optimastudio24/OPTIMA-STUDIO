<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCore | Optima Dimensional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #030305; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .ui-overlay { position: absolute; top: 2rem; left: 2rem; pointer-events: none; z-index: 10; }

        .logo-display-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            perspective: 1000px;
        }

        .floating-logo {
            max-width: 450px;
            max-height: 450px;
            width: auto;
            height: auto;
            /* Creates a cyan glowing drop-shadow behind your exact image */
            filter: drop-shadow(0px 0px 40px rgba(0, 245, 212, 0.3));
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="text-[10px] mono text-purple-400 border border-purple-400/30 px-3 py-1 rounded bg-black/80 backdrop-blur-md uppercase tracking-widest font-bold">
            Uplink: NovaCore Identity // Environment: Active
        </div>
    </div>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- Your Exact Uploaded Logo -->
    <div class="logo-display-wrapper">
        <img src="NOVACORE LOGO.png" alt="NovaCore Logo" class="floating-logo" id="nova-logo" onerror="this.src='https://via.placeholder.com/450x450?text=Upload+NOVACORE+LOGO.png+to+GitHub'">
    </div>

    <script>
        // --- Interactive 3D Tilt for Your Image ---
        const logo = document.getElementById('nova-logo');
        const wrapper = document.querySelector('.logo-display-wrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.05)`;
        });

        wrapper.addEventListener('mouseleave', () => {
            logo.style.transform = `rotateY(0deg) rotateX(0deg) scale(1)`;
            logo.style.transition = "transform 0.5s ease";
        });
        wrapper.addEventListener('mouseenter', () => {
            logo.style.transition = "none";
        });

        // --- Ambient 3D Background (Cyber Particles) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 18;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Spinning wireframe sphere behind the image
        const shell = new THREE.Mesh(
            new THREE.IcosahedronGeometry(8, 2),
            new THREE.MeshBasicMaterial({ color: 0x9d4edd, wireframe: true, transparent: true, opacity: 0.15 })
        );
        scene.add(shell);

        function animate() {
            requestAnimationFrame(animate);
            shell.rotation.y += 0.002;
            shell.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
